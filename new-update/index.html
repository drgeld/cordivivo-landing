<!doctype html>
<html lang="de">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>CordiVivo — Investor Landing · Variations</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  html,body{margin:0;padding:0;background:#f0eee9;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}
  iframe{border:0;width:100%;height:100%;display:block;background:#fff}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="design-canvas.jsx"></script>
<script type="text/babel">
  const { DesignCanvas, DCSection, DCArtboard } = window;

  const Frame = ({ src }) => (
    <iframe src={src} title={src} loading="lazy" />
  );

  function App(){
    return (
      <DesignCanvas>
        <DCSection
          id="landing"
          title="CordiVivo · Investor Landing Page"
          subtitle="Premium HealthTech · Pre-CE · MDR Klasse IIa in Vorbereitung"
        >
          <DCArtboard id="light" label="A · Light · airy clinical" width={1280} height={1800}>
            <Frame src="cordivivo-landing-light.html" />
          </DCArtboard>
          <DCArtboard id="dark" label="B · Dark · premium VC pitch" width={1280} height={1800}>
            <Frame src="cordivivo-landing-dark.html" />
          </DCArtboard>
          <DCArtboard id="dark-v2" label="C · Dark v2 · 7-Layer Engine Deep Dive" width={1280} height={2800}>
            <Frame src="cordivivo-landing-dark-v2.html" />
          </DCArtboard>
        </DCSection>
      </DesignCanvas>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
